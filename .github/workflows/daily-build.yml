name: Daily OpenWrt Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 5"

permissions:
  contents: read

concurrency:
  group: daily-openwrt-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 720
    env:
      OPENWRT_REPO: https://github.com/qosmio/openwrt-ipq
      OPENWRT_REF: main-nss
      OPENWRT_DIR: ${{ github.workspace }}/workdir/openwrt
      ARTIFACT_DIR: ${{ github.workspace }}/artifacts

    steps:
      - name: Checkout CI repository
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack \
            antlr3 \
            asciidoc \
            autoconf \
            automake \
            autopoint \
            binutils \
            bison \
            build-essential \
            clang \
            cmake \
            cpio \
            curl \
            device-tree-compiler \
            ecj \
            fastjar \
            flex \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            genisoimage \
            git \
            gperf \
            haveged \
            help2man \
            intltool \
            jq \
            libc6-dev-i386 \
            libelf-dev \
            libglib2.0-dev \
            libgmp3-dev \
            libltdl-dev \
            libmpc-dev \
            libmpfr-dev \
            libncurses-dev \
            libpython3-dev \
            libreadline-dev \
            libssl-dev \
            libtool \
            lrzsz \
            mkisofs \
            msmtp \
            ninja-build \
            p7zip \
            p7zip-full \
            patch \
            pkgconf \
            python3 \
            python3-pip \
            python3-ply \
            python3-docutils \
            qemu-utils \
            rsync \
            scons \
            sharutils \
            subversion \
            swig \
            texinfo \
            uglifyjs \
            upx-ucl \
            unzip \
            vim \
            wget \
            xmlto \
            xsltproc \
            zlib1g-dev

      - name: Restore dl cache
        uses: actions/cache@v5
        with:
          path: ${{ env.OPENWRT_DIR }}/dl
          key: openwrt-dl-${{ env.OPENWRT_REF }}-${{ hashFiles('configs/*.config', 'swaiot-patches/*.patch') }}
          restore-keys: |
            openwrt-dl-${{ env.OPENWRT_REF }}-

      - name: Build firmware
        run: ./scripts/build-openwrt.sh

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: swaiot-m01mx-openwrt-${{ github.run_number }}
          path: ${{ env.ARTIFACT_DIR }}
          if-no-files-found: error
          retention-days: 14
